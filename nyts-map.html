    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #1A1A1A; font-family: 'Roboto Condensed', sans-serif; }

    /* HEADER */
    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: #1A1A1A;
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
    }
    #header h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 20px; color: #F5F0E8; letter-spacing: 2px;
      text-transform: uppercase; flex: 1;
    }
    #geoBtn {
      background: none; border: 2px solid #F5F0E8;
      color: #F5F0E8; font-family: 'Oswald', sans-serif;
      font-size: 13px; letter-spacing: 1px;
      padding: 6px 12px; cursor: pointer;
    }
    #geoBtn:active { background: #F5F0E8; color: #1A1A1A; }

    /* FILTER BAR */
    #filters {
      position: fixed; top: 52px; left: 0; right: 0; z-index: 1000;
      background: #1A1A1A;
      display: flex; gap: 6px;
      padding: 8px 16px 10px;
      overflow-x: auto;
    }
    #filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      flex-shrink: 0;
      font-family: 'Oswald', sans-serif;
      font-size: 12px; letter-spacing: 1px;
      padding: 5px 12px; cursor: pointer;
      border: 2px solid #555; color: #aaa;
      background: none; text-transform: uppercase;
      transition: all 0.15s;
    }
    .filter-btn.active {
      border-color: #F5F0E8; color: #1A1A1A;
      background: #F5F0E8;
    }

    /* MAP */
    #map {
      position: fixed;
      top: 110px; left: 0; right: 0; bottom: 0;
    }

    /* COUNT BADGE */
    #count {
      position: fixed; bottom: 16px; right: 16px; z-index: 1000;
      background: #1A1A1A; color: #F5F0E8;
      font-family: 'Oswald', sans-serif; font-size: 13px;
      padding: 6px 12px; letter-spacing: 1px;
    }

    /* POPUP */
    .leaflet-popup-content-wrapper {
      background: #1A1A1A; color: #F5F0E8;
      border-radius: 0; box-shadow: none;
      border: 2px solid #F5F0E8;
    }
    .leaflet-popup-tip { background: #1A1A1A; }
    .leaflet-popup-content { margin: 10px 14px; }
    .popup-name { font-family: 'Oswald', sans-serif; font-size: 15px; letter-spacing: 0.5px; }
    .popup-desc { font-size: 12px; color: #aaa; margin-top: 4px; }
    .popup-cat {
      font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
      margin-top: 6px; color: #F5F0E8; opacity: 0.5;
    }
  </style>
</head>

// Category colors — matching NYTS palette
const CAT_COLORS = {
  Food:    '#FF6319',

  Museum:  '#EE352E',
  Sight:   '#0039A6',
  Shop:    '#B933AD',

};

// Init map centered on Midtown
const map = L.map('map', { zoomControl: false }).setView([40.758, -73.985], 13);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CartoDB',
  maxZoom: 19
}).addTo(map);

// Add zoom control bottom-left
L.control.zoom({ position: 'bottomleft' }).addTo(map);

// Build markers
let allMarkers = [];
let currentCat = 'ALL';

function makeIcon(cat) {
  const color = CAT_COLORS[cat] || '#888';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14">
    <circle cx="7" cy="7" r="6" fill="${color}" stroke="white" stroke-width="1.5"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [14, 14],
    iconAnchor: [7, 7],
    popupAnchor: [0, -10]
  });
}

PLACES_DATA.forEach(p => {
  const marker = L.marker([p.lat, p.lon], { icon: makeIcon(p.cat) });
  const desc = p.desc ? `<div class="popup-desc">${p.desc}</div>` : '';
  marker.bindPopup(`
    <div class="popup-name">${p.name}</div>
    ${desc}
    <div class="popup-cat">${p.cat}</div>
  `, { maxWidth: 220 });
  marker._cat = p.cat;
  allMarkers.push(marker);
  marker.addTo(map);
});

updateCount();

function filterCat(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;

  allMarkers.forEach(m => {
    if (currentCat === 'ALL' || m._cat === currentCat) {
      if (!map.hasLayer(m)) m.addTo(map);
    } else {
      if (map.hasLayer(m)) map.removeLayer(m);
    }
  });
  updateCount();
}

function updateCount() {
  const visible = allMarkers.filter(m => map.hasLayer(m)).length;
  document.getElementById('count').textContent = visible + ' places';
}

function locateMe() {
  map.locate({ setView: true, maxZoom: 16 });
}

  }).addTo(map).bindPopup('You are here').openPopup();
